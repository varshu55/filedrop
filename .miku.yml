area_labels:
  area/server:
    - "src/server.js"
    - "src/lifecycle.js"
    - "src/safe-run.js"
    - "src/errors.js"
  area/cli:
    - "src/cli.js"
    - "bin/**"
  area/network:
    - "src/network.js"
    - "src/mdns.js"
    - "src/port.js"
  area/security:
    - "src/security.js"
  area/qr:
    - "src/qr.js"
    - "src/qr.*.js"
  kind/docs:
    - "**/*.md"
    - "README*"
    - "CHANGELOG*"
    - "man/**"
  kind/ci:
    - "scripts/**"
    - "package.json"
    - ".eslintrc.json"
    - "Formula/**"
  kind/tests:
    - "src/*.test.js"
    - "src/*.test-helper.js"
    - "test/**"
    - "test.js"
    - "test2.js"

# Disable star-gate for filedrop: anyone can open a PR without starring first.
star_gate: false

# Auto-assign the PR author when they open a PR.
pr_auto_assign: true

# ECSOC26 event support
ecsoc26: true
ecsoc26_label: "ECSoC26"

# Duplicate issue detection (TF-IDF + optional OMNI fallback)
duplicate_detection: true
duplicate_threshold: 0.25
duplicate_max_candidates: 3
duplicate_scan_depth: 30
duplicate_use_omni: true
duplicate_omni_threshold: 0.12
duplicate_title_jaccard_threshold: 0.5
